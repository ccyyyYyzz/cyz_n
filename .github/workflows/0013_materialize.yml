name: Materialize Brief 0013 artifacts

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/0013/staging_payload.part*'
      - 'artifacts/0013/materialize_0013.py'

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Materialize and replay
        run: python3 artifacts/0013/materialize_0013.py
      - name: Commit generated response and artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'materialize brief 0013 scheduled kernel'
          git pull --rebase origin main
          git push origin HEAD:main
